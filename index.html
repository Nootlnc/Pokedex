<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poke Master Elite - Horizon Games</title>
    <style>
        /* CSS RESPONSIVO NÍVEL 2026 */
        :root {
            --primary: #ff1f1f;
            --secondary: #3b4cca;
            --bg: #121212;
            --card-bg: #1e1e1e;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background: var(--primary);
            width: 100%;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* GRID RESPONSIVO: Aqui está o segredo! */
        .pokedex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1200px;
            padding: 20px;
        }

        .pokemon-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 2px solid #333;
            transition: transform 0.3s, border-color 0.3s;
        }

        .pokemon-card:hover {
            transform: translateY(-5px);
            border-color: var(--secondary);
        }

        .pokemon-card img {
            width: 80px;
            height: 80px;
        }

        .type-tag {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .grass { background: #78C850; }
        .fire { background: #F08030; }
        .water { background: #6890F0; }
        .bug { background: #A8B820; }
        /* Outros tipos aqui... */

        @media (max-width: 600px) {
            .pokedex-grid { grid-template-columns: repeat(2, 1fr); }
            header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>HORIZON POKÉDEX ELITE</h1>
    <p>Banco de Dados Gerado para o macOS Tahoe</p>
</header>

<div class="pokedex-grid" id="pokedex">
    </div>

<script>
    // BANCO DE DATOS (Módulo de 150 Pokémons)
    // Para não travar, vamos usar um gerador automático que simula os 150
    const tipos = ['fire', 'water', 'grass', 'bug', 'electric', 'psychic', 'rock', 'ghost'];
    const nomesFamosos = ['Bulbasaur', 'Ivysaur', 'Venusaur', 'Charmander', 'Charmeleon', 'Charizard', 'Squirtle', 'Wartortle', 'Blastoise', 'Caterpie', 'Metapod', 'Butterfree', 'Weedle', 'Kakuna', 'Beedrill', 'Pidgey', 'Pidgeotto', 'Pidgeot', 'Rattata', 'Raticate', 'Pikachu', 'Raichu'];

    const pokedexContainer = document.getElementById('pokedex');

    function carregarPokedex() {
        let htmlContent = '';

        for (let i = 1; i <= 150; i++) {
            // Se o nome não estiver na lista acima, ele cria um "Poke-ID"
            const nome = nomesFamosos[i-1] || `Pokémon #${i}`;
            const tipoAleatorio = tipos[Math.floor(Math.random() * tipos.length)];
            
            // Usando a API oficial de sprites para ficar bonito e profissional
            const spriteUrl = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${i}.png`;

            htmlContent += `
                <div class="pokemon-card">
                    <small>#${i.toString().padStart(3, '0')}</small>
                    <img src="${spriteUrl}" alt="${nome}">
                    <h3>${nome}</h3>
                    <span class="type-tag ${tipoAleatorio}">${tipoAleatorio}</span>
                    <div style="font-size: 10px; margin-top: 10px; color: #888;">
                        ATK: ${Math.floor(Math.random() * 100)} | DEF: ${Math.floor(Math.random() * 100)}
                    </div>
                </div>
            `;
        }
        pokedexContainer.innerHTML = htmlContent;
    }

    // Inicializa o banco de dados
    carregarPokedex();

</script>
</body>
</html>
